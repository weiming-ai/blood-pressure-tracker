<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康血压</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .record-card {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        .record-card:hover {
            transform: translateX(5px);
            border-left-color: #667eea;
        }
        .status-normal { color: #10b981; }
        .status-warning { color: #f59e0b; }
        .status-danger { color: #ef4444; }
        .upload-area {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto">
        <!-- 标题 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">
                <i class="fas fa-heart-pulse mr-3"></i>健康血压
            </h1>
            <p class="text-white/80">智能记录 · 趋势分析 · 照片识别 · 自动读取拍摄时间</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：数据录入 -->
            <div class="lg:col-span-1">
                <div class="glass p-6 mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-camera mr-2 text-indigo-600"></i>照片识别录入
                    </h2>
                    <div class="upload-area rounded-xl p-6 text-center cursor-pointer" id="uploadArea">
                        <input type="file" id="photoInput" accept="image/*" class="hidden">
                        <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
                        <p class="text-gray-600 mb-2">点击或拖拽上传血压计照片</p>
                        <p class="text-sm text-gray-400">自动读取照片拍摄时间和血压数据</p>
                    </div>
                    <div id="uploadPreview" class="hidden mt-4">
                        <img id="previewImg" class="w-full rounded-lg shadow-md">
                        <div id="ocrResult" class="mt-3 p-3 bg-indigo-50 rounded-lg hidden">
                            <p class="text-sm text-indigo-700"><i class="fas fa-magic mr-2"></i>识别结果：</p>
                            <div id="ocrText" class="text-sm text-gray-700 mt-1"></div>
                        </div>
                    </div>
                </div>

                <div class="glass p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-pen-to-square mr-2 text-indigo-600"></i>手动录入
                    </h2>
                    <form id="bpForm" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">收缩压 (高压)</label>
                                <div class="relative">
                                    <input type="number" id="systolic" required min="50" max="250"
                                        class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500"
                                        placeholder="120">
                                    <span class="absolute right-3 top-2 text-gray-400 text-sm">mmHg</span>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">舒张压 (低压)</label>
                                <div class="relative">
                                    <input type="number" id="diastolic" required min="30" max="150"
                                        class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500"
                                        placeholder="80">
                                    <span class="absolute right-3 top-2 text-gray-400 text-sm">mmHg</span>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">心率</label>
                                <div class="relative">
                                    <input type="number" id="heartRate" min="40" max="200"
                                        class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500"
                                        placeholder="75">
                                    <span class="absolute right-3 top-2 text-gray-400 text-sm">bpm</span>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">测量时段</label>
                                <select id="timePeriod" class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                                    <option value="morning">上午 (6:00-10:00)</option>
                                    <option value="afternoon">下午 (14:00-16:00)</option>
                                    <option value="evening">晚上 (20:00-22:00)</option>
                                    <option value="other">其他时间</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">测量时间</label>
                            <input type="datetime-local" id="measureTime" required
                                class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                            <input type="text" id="notes"
                                class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500"
                                placeholder="例如：运动后、服药前...">
                        </div>
                        <button type="submit" class="btn-gradient w-full py-3 rounded-lg text-white font-semibold">
                            <i class="fas fa-plus mr-2"></i>添加记录
                        </button>
                    </form>
                </div>
            </div>

            <!-- 右侧：数据展示 -->
            <div class="lg:col-span-2 space-y-6">
                <!-- 统计卡片 -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="glass p-4 text-center">
                        <p class="text-sm text-gray-500">平均收缩压</p>
                        <p class="text-2xl font-bold text-indigo-600" id="avgSystolic">--</p>
                        <p class="text-xs text-gray-400">mmHg</p>
                    </div>
                    <div class="glass p-4 text-center">
                        <p class="text-sm text-gray-500">平均舒张压</p>
                        <p class="text-2xl font-bold text-indigo-600" id="avgDiastolic">--</p>
                        <p class="text-xs text-gray-400">mmHg</p>
                    </div>
                    <div class="glass p-4 text-center">
                        <p class="text-sm text-gray-500">平均心率</p>
                        <p class="text-2xl font-bold text-pink-500" id="avgHeartRate">--</p>
                        <p class="text-xs text-gray-400">bpm</p>
                    </div>
                    <div class="glass p-4 text-center">
                        <p class="text-sm text-gray-500">记录总数</p>
                        <p class="text-2xl font-bold text-green-500" id="totalRecords">0</p>
                        <p class="text-xs text-gray-400">条</p>
                    </div>
                </div>

                <!-- 图表 -->
                <div class="glass p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-chart-line mr-2 text-indigo-600"></i>血压趋势图
                    </h2>
                    <div class="h-64">
                        <canvas id="bpChart"></canvas>
                    </div>
                </div>

                <!-- 数据表格 -->
                <div class="glass p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-gray-800">
                            <i class="fas fa-table mr-2 text-indigo-600"></i>测量记录
                        </h2>
                        <div class="space-x-2">
                            <button onclick="exportData()" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
                                <i class="fas fa-download mr-1"></i>导出
                            </button>
                            <button onclick="clearAllData()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                                <i class="fas fa-trash mr-1"></i>清空
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-gray-50">
                                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">时间</th>
                                    <th class="px-4 py-3 text-left text-sm font-medium text-gray-700">时段</th>
                                    <th class="px-4 py-3 text-center text-sm font-medium text-gray-700">收缩压</th>
                                    <th class="px-4 py-3 text-center text-sm font-medium text-gray-700">舒张压</th>
                                    <th class="px-4 py-3 text-center text-sm font-medium text-gray-700">心率</th>
                                    <th class="px-4 py-3 text-center text-sm font-medium text-gray-700">状态</th>
                                    <th class="px-4 py-3 text-center text-sm font-medium text-gray-700">操作</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTable">
                                <!-- 记录将在这里动态生成 -->
                            </tbody>
                        </table>
                    </div>
                    <div id="emptyState" class="text-center py-8 text-gray-400">
                        <i class="fas fa-clipboard-list text-4xl mb-2"></i>
                        <p>暂无记录，请添加第一条血压数据</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="glass p-6 w-full max-w-md mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">
                    <i class="fas fa-edit mr-2 text-indigo-600"></i>修改记录
                </h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">收缩压 (高压)</label>
                        <div class="relative">
                            <input type="number" id="editSystolic" required min="50" max="250"
                                class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                            <span class="absolute right-3 top-2 text-gray-400 text-sm">mmHg</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">舒张压 (低压)</label>
                        <div class="relative">
                            <input type="number" id="editDiastolic" required min="30" max="150"
                                class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                            <span class="absolute right-3 top-2 text-gray-400 text-sm">mmHg</span>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">心率</label>
                        <div class="relative">
                            <input type="number" id="editHeartRate" min="40" max="200"
                                class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                            <span class="absolute right-3 top-2 text-gray-400 text-sm">bpm</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">测量时段</label>
                        <select id="editTimePeriod" class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                            <option value="morning">上午 (6:00-10:00)</option>
                            <option value="afternoon">下午 (14:00-16:00)</option>
                            <option value="evening">晚上 (20:00-22:00)</option>
                            <option value="other">其他时间</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">测量时间</label>
                    <input type="datetime-local" id="editMeasureTime" required
                        class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                    <input type="text" id="editNotes"
                        class="input-glow w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500"
                        placeholder="例如：运动后、服药前...">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeEditModal()"
                        class="flex-1 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
                        取消
                    </button>
                    <button type="submit"
                        class="flex-1 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition">
                        <i class="fas fa-save mr-1"></i>保存修改
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 数据存储
        let bpRecords = JSON.parse(localStorage.getItem('bpRecords')) || [];
        let chart = null;

        // 时段标签
        const periodLabels = {
            morning: '上午',
            afternoon: '下午',
            evening: '晚上',
            other: '其他'
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置默认时间为当前时间
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('measureTime').value = now.toISOString().slice(0, 16);

            // 加载数据
            renderTable();
            updateStats();
            initChart();

            // 绑定表单提交
            document.getElementById('bpForm').addEventListener('submit', addRecord);

            // 绑定编辑表单提交
            document.getElementById('editForm').addEventListener('submit', saveEdit);

            // 绑定照片上传
            setupPhotoUpload();
        });

        // 设置照片上传
        function setupPhotoUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const photoInput = document.getElementById('photoInput');

            uploadArea.addEventListener('click', () => photoInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handlePhoto(files[0]);
                }
            });

            photoInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handlePhoto(e.target.files[0]);
                }
            });
        }

        // 从File对象读取EXIF日期时间
        function extractExifDateTime(file) {
            return new Promise((resolve) => {
                EXIF.getData(file, function() {
                    const dateTimeOriginal = EXIF.getTag(this, 'DateTimeOriginal');
                    const dateTime = EXIF.getTag(this, 'DateTime');
                    const dateTimeDigitized = EXIF.getTag(this, 'DateTimeDigitized');

                    // 优先使用 DateTimeOriginal，其次是 DateTime，最后是 DateTimeDigitized
                    const exifTime = dateTimeOriginal || dateTime || dateTimeDigitized;

                    if (exifTime) {
                        // EXIF时间格式: "2024:01:15 14:30:25"
                        const parts = exifTime.split(' ');
                        const datePart = parts[0].replace(/:/g, '-');
                        const timePart = parts[1];
                        const isoString = `${datePart}T${timePart}`;
                        resolve(new Date(isoString));
                    } else {
                        resolve(null);
                    }
                });
            });
        }

        // 根据时间自动判断时段
        function getTimePeriodByHour(hour) {
            if (hour >= 6 && hour < 10) return 'morning';
            if (hour >= 14 && hour < 16) return 'afternoon';
            if (hour >= 20 && hour < 22) return 'evening';
            return 'other';
        }

        // 处理照片
        async function handlePhoto(file) {
            const reader = new FileReader();

            // 读取EXIF时间
            let photoTime = null;
            try {
                photoTime = await extractExifDateTime(file);
            } catch (e) {
                console.log('无法读取EXIF时间:', e);
            }

            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('uploadPreview').classList.remove('hidden');

                // 模拟OCR识别（实际应用需要调用OCR API）
                simulateOCR(e.target.result, photoTime);
            };
            reader.readAsDataURL(file);
        }

        // 模拟OCR识别
        function simulateOCR(imageData, photoTime) {
            const ocrResult = document.getElementById('ocrResult');
            const ocrText = document.getElementById('ocrText');

            ocrResult.classList.remove('hidden');
            ocrText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>正在识别...';

            // 这里模拟OCR识别过程
            // 实际应用中应该调用OCR API（如百度OCR、腾讯OCR等）
            setTimeout(() => {
                // 模拟识别结果 - 实际应用中这里应该是真实的OCR结果
                const mockResults = [
                    { sys: 125, dia: 82, hr: 76 },
                    { sys: 118, dia: 78, hr: 72 },
                    { sys: 132, dia: 85, hr: 80 }
                ];
                const result = mockResults[Math.floor(Math.random() * mockResults.length)];

                // 处理照片时间
                let timeInfo = '';
                let timeParam = '';
                let periodParam = '';

                if (photoTime) {
                    const dateStr = photoTime.toLocaleDateString('zh-CN');
                    const timeStr = photoTime.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                    const hour = photoTime.getHours();
                    const period = getTimePeriodByHour(hour);
                    const periodName = periodLabels[period];

                    timeInfo = `
                        <div class="mt-2 p-2 bg-green-50 rounded border border-green-200">
                            <i class="fas fa-clock text-green-600 mr-1"></i>
                            <span class="text-sm text-green-700">
                                照片拍摄时间：<strong>${dateStr} ${timeStr}</strong>（${periodName}）
                            </span>
                        </div>
                    `;

                    // 准备传给fillForm的时间参数
                    photoTime.setMinutes(photoTime.getMinutes() - photoTime.getTimezoneOffset());
                    timeParam = photoTime.toISOString().slice(0, 16);
                    periodParam = period;
                } else {
                    timeInfo = `
                        <div class="mt-2 p-2 bg-yellow-50 rounded border border-yellow-200">
                            <i class="fas fa-exclamation-triangle text-yellow-600 mr-1"></i>
                            <span class="text-sm text-yellow-700">
                                未读取到照片拍摄时间，将使用当前时间
                            </span>
                        </div>
                    `;
                }

                ocrText.innerHTML = `
                    <div class="grid grid-cols-3 gap-2 text-center mt-2">
                        <div class="bg-white p-2 rounded">
                            <div class="text-xs text-gray-500">收缩压</div>
                            <div class="font-bold text-indigo-600">${result.sys}</div>
                        </div>
                        <div class="bg-white p-2 rounded">
                            <div class="text-xs text-gray-500">舒张压</div>
                            <div class="font-bold text-indigo-600">${result.dia}</div>
                        </div>
                        <div class="bg-white p-2 rounded">
                            <div class="text-xs text-gray-500">心率</div>
                            <div class="font-bold text-pink-500">${result.hr}</div>
                        </div>
                    </div>
                    ${timeInfo}
                    <button onclick="fillForm(${result.sys}, ${result.dia}, ${result.hr}, '${timeParam}', '${periodParam}')"
                        class="mt-3 w-full py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition text-sm">
                        <i class="fas fa-check mr-1"></i>确认并填入表单
                    </button>
                `;
            }, 1500);
        }

        // 填充表单
        function fillForm(sys, dia, hr, timeStr, period) {
            document.getElementById('systolic').value = sys;
            document.getElementById('diastolic').value = dia;
            document.getElementById('heartRate').value = hr;

            // 如果提供了时间，填入时间字段
            if (timeStr) {
                document.getElementById('measureTime').value = timeStr;
            }

            // 如果提供了时段，选择对应时段
            if (period) {
                document.getElementById('timePeriod').value = period;
            }
        }

        // 添加记录
        function addRecord(e) {
            e.preventDefault();

            const record = {
                id: Date.now(),
                systolic: parseInt(document.getElementById('systolic').value),
                diastolic: parseInt(document.getElementById('diastolic').value),
                heartRate: parseInt(document.getElementById('heartRate').value) || null,
                timePeriod: document.getElementById('timePeriod').value,
                measureTime: new Date(document.getElementById('measureTime').value),
                notes: document.getElementById('notes').value
            };

            bpRecords.push(record);
            bpRecords.sort((a, b) => new Date(b.measureTime) - new Date(a.measureTime));

            saveData();
            renderTable();
            updateStats();
            updateChart();

            // 重置表单
            document.getElementById('bpForm').reset();
            document.getElementById('uploadPreview').classList.add('hidden');
            document.getElementById('ocrResult').classList.add('hidden');

            // 重新设置默认时间
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('measureTime').value = now.toISOString().slice(0, 16);
        }

        // 获取血压状态
        function getBPStatus(sys, dia) {
            if (sys < 120 && dia < 80) return { label: '正常', class: 'status-normal' };
            if (sys < 130 && dia < 80) return { label: '正常偏高', class: 'status-warning' };
            if (sys < 140 || dia < 90) return { label: '轻度高血压', class: 'status-warning' };
            if (sys < 160 || dia < 100) return { label: '中度高血压', class: 'status-danger' };
            return { label: '重度高血压', class: 'status-danger' };
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('recordsTable');
            const emptyState = document.getElementById('emptyState');

            if (bpRecords.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            tbody.innerHTML = bpRecords.map(record => {
                const status = getBPStatus(record.systolic, record.diastolic);
                const date = new Date(record.measureTime);
                const dateStr = date.toLocaleDateString('zh-CN');
                const timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

                return `
                    <tr class="record-card border-b border-gray-100 hover:bg-gray-50 animate-fade-in">
                        <td class="px-4 py-3">
                            <div class="text-sm font-medium text-gray-900">${dateStr}</div>
                            <div class="text-xs text-gray-500">${timeStr}</div>
                        </td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 text-xs rounded-full bg-indigo-100 text-indigo-700">
                                ${periodLabels[record.timePeriod]}
                            </span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <span class="text-lg font-semibold ${record.systolic > 140 ? 'text-red-500' : 'text-gray-800'}">${record.systolic}</span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <span class="text-lg font-semibold ${record.diastolic > 90 ? 'text-red-500' : 'text-gray-800'}">${record.diastolic}</span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            ${record.heartRate ? `<span class="text-gray-700">${record.heartRate}</span>` : '--'}
                        </td>
                        <td class="px-4 py-3 text-center">
                            <span class="${status.class} font-medium text-sm">${status.label}</span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="openEditModal(${record.id})" class="text-indigo-500 hover:text-indigo-700 transition mr-3" title="编辑">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteRecord(${record.id})" class="text-red-500 hover:text-red-700 transition" title="删除">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 更新统计
        function updateStats() {
            if (bpRecords.length === 0) {
                document.getElementById('avgSystolic').textContent = '--';
                document.getElementById('avgDiastolic').textContent = '--';
                document.getElementById('avgHeartRate').textContent = '--';
                document.getElementById('totalRecords').textContent = '0';
                return;
            }

            const avgSys = Math.round(bpRecords.reduce((sum, r) => sum + r.systolic, 0) / bpRecords.length);
            const avgDia = Math.round(bpRecords.reduce((sum, r) => sum + r.diastolic, 0) / bpRecords.length);
            const hrRecords = bpRecords.filter(r => r.heartRate);
            const avgHr = hrRecords.length > 0
                ? Math.round(hrRecords.reduce((sum, r) => sum + r.heartRate, 0) / hrRecords.length)
                : '--';

            document.getElementById('avgSystolic').textContent = avgSys;
            document.getElementById('avgDiastolic').textContent = avgDia;
            document.getElementById('avgHeartRate').textContent = avgHr;
            document.getElementById('totalRecords').textContent = bpRecords.length;
        }

        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: '收缩压',
                            data: [],
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '舒张压',
                            data: [],
                            borderColor: '#764ba2',
                            backgroundColor: 'rgba(118, 75, 162, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 40,
                            max: 200
                        }
                    }
                }
            });

            updateChart();
        }

        // 更新图表
        function updateChart() {
            if (!chart || bpRecords.length === 0) return;

            // 按时间排序（从早到晚）
            const sortedRecords = [...bpRecords].sort((a, b) =>
                new Date(a.measureTime) - new Date(b.measureTime)
            );

            // 只显示最近30条记录
            const recentRecords = sortedRecords.slice(-30);

            chart.data.labels = recentRecords.map(r => {
                const date = new Date(r.measureTime);
                return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
            });
            chart.data.datasets[0].data = recentRecords.map(r => r.systolic);
            chart.data.datasets[1].data = recentRecords.map(r => r.diastolic);
            chart.update();
        }

        // 打开编辑弹窗
        function openEditModal(id) {
            const record = bpRecords.find(r => r.id === id);
            if (!record) return;

            document.getElementById('editId').value = id;
            document.getElementById('editSystolic').value = record.systolic;
            document.getElementById('editDiastolic').value = record.diastolic;
            document.getElementById('editHeartRate').value = record.heartRate || '';
            document.getElementById('editTimePeriod').value = record.timePeriod;
            document.getElementById('editNotes').value = record.notes || '';

            // 设置时间
            const measureTime = new Date(record.measureTime);
            measureTime.setMinutes(measureTime.getMinutes() - measureTime.getTimezoneOffset());
            document.getElementById('editMeasureTime').value = measureTime.toISOString().slice(0, 16);

            document.getElementById('editModal').classList.remove('hidden');
        }

        // 关闭编辑弹窗
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editForm').reset();
        }

        // 保存编辑
        function saveEdit(e) {
            e.preventDefault();

            const id = parseInt(document.getElementById('editId').value);
            const recordIndex = bpRecords.findIndex(r => r.id === id);

            if (recordIndex === -1) return;

            bpRecords[recordIndex] = {
                id: id,
                systolic: parseInt(document.getElementById('editSystolic').value),
                diastolic: parseInt(document.getElementById('editDiastolic').value),
                heartRate: parseInt(document.getElementById('editHeartRate').value) || null,
                timePeriod: document.getElementById('editTimePeriod').value,
                measureTime: new Date(document.getElementById('editMeasureTime').value),
                notes: document.getElementById('editNotes').value
            };

            // 按时间重新排序
            bpRecords.sort((a, b) => new Date(b.measureTime) - new Date(a.measureTime));

            saveData();
            renderTable();
            updateStats();
            updateChart();
            closeEditModal();
        }

        // 点击弹窗外部关闭
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });

        // 删除记录
        function deleteRecord(id) {
            if (confirm('确定要删除这条记录吗？')) {
                bpRecords = bpRecords.filter(r => r.id !== id);
                saveData();
                renderTable();
                updateStats();
                updateChart();
            }
        }

        // 清空所有数据
        function clearAllData() {
            if (confirm('确定要清空所有记录吗？此操作不可恢复！')) {
                bpRecords = [];
                saveData();
                renderTable();
                updateStats();
                updateChart();
            }
        }

        // 导出数据
        function exportData() {
            if (bpRecords.length === 0) {
                alert('暂无数据可导出');
                return;
            }

            const csvContent = [
                ['日期', '时间', '时段', '收缩压(mmHg)', '舒张压(mmHg)', '心率(bpm)', '状态', '备注'],
                ...bpRecords.map(r => {
                    const date = new Date(r.measureTime);
                    const status = getBPStatus(r.systolic, r.diastolic);
                    return [
                        date.toLocaleDateString('zh-CN'),
                        date.toLocaleTimeString('zh-CN'),
                        periodLabels[r.timePeriod],
                        r.systolic,
                        r.diastolic,
                        r.heartRate || '',
                        status.label,
                        r.notes || ''
                    ];
                })
            ].map(row => row.join(',')).join('\n');

            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `血压记录_${new Date().toLocaleDateString('zh-CN')}.csv`;
            link.click();
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('bpRecords', JSON.stringify(bpRecords));
        }
    </script>
</body>
</html>
